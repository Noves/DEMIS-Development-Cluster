# Application Information
appName: "notification-gateway"
appNamespace: "${namespace}" # defaults to Release.Namespace
# Settings for the Kubernetes Service Object for the Application
appServiceType: ClusterIP
appServicePortExternal: 8080
appServicePortTarget: 8080
appServicePortProtocol: TCP
appServicePortName: http

# Istio Information
# the List of the Istio Gateway Objects to be used for external cluster access
virtualServiceGateways: 
  - ${cluster_gateway}
# the List of the Hostnames/Domains that should match the VirtualService definition (external)
# Portal Hostnames
virtualServiceDomains:
  %{~ for hostname in portal_hostnames ~}
  - ${hostname}
  %{~ endfor ~}

%{ if length(istio_rules_block_external) == 0 ~}
virtualServiceExternalHttpRules:
  - headers:
      request:
        set:
          x-fhir-api-request-origin: internal
          x-fhir-api-submission-type: pathogen
          x-fhir-package-version: v${package_laboratory_major_version}
          x-fhir-api-version: v${package_laboratory_major_version}
          x-api-version: v${package_laboratory_major_version}
%{ if fhir_core_split_enabled == true ~}
          x-fhir-profile: laboratory
          x-fhir-package: laboratory
%{ else ~}
          x-fhir-package: fhir-profile-snapshots
          x-fhir-profile: fhir-profile-snapshots
%{ endif ~}
    match:
    - uri:
        prefix: ${context_path}/gateway/pathogen
    rewrite:
      uri: /
  - headers:
      request:
        set:
          x-fhir-api-request-origin: internal
          x-fhir-api-submission-type: disease
          x-fhir-package-version: v${package_disease_major_version}
          x-fhir-api-version: v${package_disease_major_version}
          x-api-version: v${package_disease_major_version}
%{ if fhir_core_split_enabled == true ~}
          x-fhir-profile: disease
          x-fhir-package: disease
%{ else ~}

          x-fhir-package: fhir-profile-snapshots
          x-fhir-profile: fhir-profile-snapshots
%{ endif ~}
    match:
    - uri:
        prefix: ${context_path}/gateway/disease
    rewrite:
      uri: /
  - headers:
      request:
        set:
          x-fhir-api-request-origin: internal
          x-fhir-package-version: v${package_statistic_major_version}
          x-fhir-api-version: v${package_statistic_major_version}
          x-api-version: v${package_statistic_major_version}
%{ if fhir_core_split_enabled == true ~}
          x-fhir-profile: statistic
          x-fhir-package: statistic
%{ else ~}
          x-fhir-package: fhir-profile-snapshots
          x-fhir-profile: fhir-profile-snapshots
%{ endif ~}
    match:
    - uri:
        prefix: ${context_path}/gateway/bedoccupancy
    rewrite:
      uri: /
%{ if http_timeout_retry_block != null ~}
    ${indent(4, http_timeout_retry_block)}
%{ endif ~}
%{else ~}
virtualServiceExternalHttpRules:
%{ for entry in istio_rules_block_external ~}
  - ${indent(4, yamlencode(entry))}
    ${indent(4, http_timeout_retry_block)}
%{ endfor ~}
%{ endif ~}
