# Application Information
appName: "validation-service"
appNamespace: "${namespace}" # defaults to Release.Namespace
# Settings for the Kubernetes Service Object for the Application
appServiceType: ClusterIP
appServicePortExternal: 8080
appServicePortTarget: 8080
appServicePortProtocol: TCP
appServicePortName: http

# Istio Information

# HTTP Rules for internal endpoints - https://istio.io/latest/docs/reference/config/networking/virtual-service/#HTTPRoute
# The "route" part is generated using the destination subset information

virtualServiceHttpRules:
%{ if fhir_core_split_enabled == true ~}
%{ for entry in [{package = "disease", service = "disease"}, {package = "laboratory", service = "pathogen"}, {package = "statistic", service = "bedoccupancy"}, {package = "igs", service = "igs"}, {package = "ars", service = "ars"}] ~}
  - match:
    - headers:
        x-fhir-profile:
          exact: ${entry.package}
      uri:
        prefix: /
    - headers:
        x-fhir-package:
          exact: ${entry.package}
      uri:
        prefix: /
    rewrite:
      uri: /
    delegate:
      name: validation-service-${entry.service}-internal
      namespace: ${namespace}
%{ endfor ~}
%{ else ~}
%{ for profile in [ "", "igs", "ars"] ~}
  - match:
    - headers:
        x-fhir-profile:
          exact: ${coalesce(profile,"fhir")}-profile-snapshots
      uri:
        prefix: /
    - headers:
        x-fhir-package:
          exact: ${coalesce(profile,"fhir")}-profile-snapshots
      uri:
        prefix: /
%{ if profile != "" ~}
    - headers:
        x-fhir-package:
          exact: ${profile}
      uri:
        prefix: /
%{ endif ~}
    rewrite:
      uri: /
    delegate:
      name: validation-service-${coalesce(profile,"core")}-internal
      namespace: ${namespace}
%{ endfor ~}
  - match:
    - uri:
        prefix: /
    rewrite:
      uri: /
    delegate:
      name: validation-service-core-internal
      namespace: ${namespace}
%{ endif ~}
